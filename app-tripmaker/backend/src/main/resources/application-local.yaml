spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key}
  datasource:
    url: jdbc:h2:mem:tripmaker_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: SA
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
